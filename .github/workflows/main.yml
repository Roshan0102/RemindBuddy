name: Build and Deploy

on:
  push:
    branches: [ master, main ]

jobs:
  # Job 1: Build Android APK
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'
          
      - name: Get Dependencies
        working-directory: ./frontend
        run: |
          flutter pub get
          flutter clean
        
      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      - name: Build with Shorebird
        working-directory: ./frontend
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: shorebird release android --artifact apk --flutter-version=3.41.0 -- --no-tree-shake-icons
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: frontend/build/app/outputs/apk/release/app-release.apk

  # Job 2: Build Web Artifacts
  build-web:
    name: Build Web Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'

      - name: Get Dependencies
        working-directory: ./frontend
        run: |
          flutter pub get
          flutter clean

      - name: Build Web
        working-directory: ./frontend
        run: flutter build web --release --no-tree-shake-icons

      - name: Upload Web Build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: frontend/build/web/

  # Job 3: Deploy to Firebase Hosting
  deploy-web:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: frontend/build/web

      - name: Install Functions Dependencies
        working-directory: ./functions
        run: npm install

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: remindbuddy-b68f9
