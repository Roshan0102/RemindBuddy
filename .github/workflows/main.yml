name: Build and Deploy

on:
  push:
    branches: [ master, main ]

jobs:
  # Job 1: Build Android APK
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'

      - name: Create placeholder .env
        working-directory: ./frontend
        run: echo "GEMINI_API_KEY=dummy_key" > .env
        
      - name: Get Dependencies
        working-directory: ./frontend
        run: |
          flutter pub get
          flutter clean
        
      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      - name: Build with Shorebird
        working-directory: ./frontend
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: shorebird release android --artifact apk --flutter-version=3.41.0 -- --no-tree-shake-icons
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: frontend/build/app/outputs/apk/release/app-release.apk
