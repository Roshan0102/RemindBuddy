name: Build and Deploy

on:
  push:
    branches: [ master, main ]

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.0'
          channel: 'stable'

      - name: Create placeholder .env
        working-directory: ./frontend
        run: echo "GEMINI_API_KEY=dummy_key" > .env
        
      - name: Get Dependencies
        working-directory: ./frontend
        run: |
          flutter pub get
          flutter clean
        
      - name: Build Standard APK
        working-directory: ./frontend
        run: flutter build apk --release --no-tree-shake-icons

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      - name: Build with Shorebird (Optional)
        working-directory: ./frontend
        continue-on-error: true
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: shorebird release android --artifact apk --flutter-version=3.41.0 -- --no-tree-shake-icons
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: frontend/build/app/outputs/apk/release/app-release.apk

      - name: Extract version from pubspec.yaml
        id: get_version
        working-directory: ./frontend
        run: |
          VERSION=$(grep '^version: ' pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          files: frontend/build/app/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
